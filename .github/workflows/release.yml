name: Create Release
on:
  push:
    tags:
      - '*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Create build directory
        run: mkdir -p build
      - name: Compile seasons program
        run: |
          gcc -o build/seasons src/main.c -lm
      - name: Generate checksums
        run: |
          shasum -a 256 build/* > build/checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/seasons
            build/checksums.txt
